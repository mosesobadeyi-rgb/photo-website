      padding: 20px;

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }
    .card {
      background: #222;
      border: 1px solid #333;
      padding: 10px;
      border-radius: 4px;
      text-align: center;
    }
    img {
      max-width: 100%;
      height: auto;
      border: 1px solid #444;
      margin-top: 10px;
    }
  </style>
</head>
